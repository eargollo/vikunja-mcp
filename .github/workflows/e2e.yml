name: e2e (reusable)

# Reusable end-to-end job: boots a throwaway Vikunja container at the requested
# version and runs the MCP e2e suite against it. Called by ci.yml (pinned tag,
# required) and upstream-drift.yml (:latest, non-gating) so the boot/bootstrap/
# teardown sequence lives in exactly one place and the two callers can't drift.
on:
  workflow_call:
    inputs:
      vikunja-version:
        description: Vikunja Docker image tag to run the suite against.
        type: string
        default: "2.3.0"

# Only ever reads the repo; the caller can't widen this.
permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end (Vikunja ${{ inputs.vikunja-version }})
    runs-on: ubuntu-latest
    # Guard against a wedged container burning the default 6h.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Start Vikunja
        run: npm run up
        env:
          # docker compose interpolates this into the image tag; unset locally it
          # falls back to the pinned default in docker-compose.yml.
          VIKUNJA_VERSION: ${{ inputs.vikunja-version }}
      - name: Bootstrap test user and .env
        run: npm run bootstrap
      - name: Run end-to-end tests
        run: npm run test:e2e
      - name: Show Vikunja logs on failure
        if: failure()
        run: docker compose logs vikunja
      - name: Stop Vikunja
        if: always()
        run: npm run down
