name: Release

# Cut a GitHub Release AND publish to npm whenever a version tag is pushed.
# The release process is:
#
#   npm version minor        # bumps package.json + lockfile, commits, tags vX.Y.Z
#   git push --follow-tags   # pushes the commit and the tag -> triggers this job
#
# npm publishing uses Trusted Publishing (OIDC): the workflow authenticates to
# npm with a short-lived GitHub identity token — no NPM_TOKEN secret to store or
# leak, and provenance is attached automatically. This requires the package's
# Trusted Publisher to point at this repo + workflow (configured on npmjs.com).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for npm Trusted Publishing

jobs:
  release:
    name: Release + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # NOTE: do NOT set registry-url here. It makes setup-node write an
      # .npmrc with a placeholder auth token, which npm then tries to use
      # instead of falling through to OIDC Trusted Publishing (→ 404). The
      # default registry is npmjs.org already, and OIDC needs no token.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Gate the release on the unit suite so a tag can't ship broken helpers.
      - run: npm test

      # Publish via OIDC Trusted Publishing (no token, provenance attached).
      # Needs npm >= 11.5.1. Node 24 ships npm 11.x, but upgrade to latest anyway
      # so publish runs on current npm. (Node must be >= 22: npm@latest is 12.x
      # now and refuses to install on Node 20 — hence node-version: 24 above.)
      # Do NOT add setup-node registry-url: it writes a placeholder-token
      # .npmrc that npm uses instead of OIDC (→ 404). Requires a Trusted
      # Publisher for this repo + release.yml configured on npmjs.com.
      - name: Publish to npm (OIDC Trusted Publishing)
        run: |
          npm install -g npm@latest
          npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
