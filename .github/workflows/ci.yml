name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the repo. The dependency-review job
# needs read access to the contents/dependency graph; nothing here writes.
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Fail the build on a known-vulnerable production dependency. --omit=dev
      # scopes it to what actually ships; devDeps and tooling don't gate here.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: No console.log in server sources
        run: |
          if grep -n 'console\.log' index.js server.js lib.js tools.js api.js; then
            echo "console.log is not allowed in server sources (use console.error for stderr)"
            exit 1
          fi
      # Pure helpers only — no Docker, no network. The e2e file self-skips here
      # because VIKUNJA_URL / VIKUNJA_API_TOKEN aren't set. Fails the build if
      # coverage drops below the thresholds in the test:coverage script.
      - run: npm run test:coverage
      # The thresholds above are global; this adds a per-file branch-coverage
      # floor so a low-branch file (tools.js) can't decay while hiding behind the
      # well-covered pure helpers. See scripts/check-branch-coverage.mjs.
      - name: Enforce per-file branch-coverage floors
        run: npm run test:coverage:floors

  lint:
    name: Lint (eslint-plugin-security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      # eslint + eslint-plugin-security are deliberately NOT project deps (keeps
      # the tree to one runtime dep, no devDeps). Install them ephemerally, at
      # pinned versions, without touching package.json or the lockfile. .npmrc
      # (ignore-scripts) applies here too, so nothing runs install hooks.
      - name: Run ESLint (ephemeral, pinned)
        run: |
          npm install --no-save --no-package-lock --no-audit --no-fund \
            eslint@10.6.0 eslint-plugin-security@4.0.1
          npx --no-install eslint --max-warnings 0 index.js server.js api.js lib.js tools.js

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # PR-only: this action diffs the PR's dependency changes against the base
    # branch, so it has nothing to compare on a push.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    # PR-only, like dependency-review: scans the PR's commit range. Pushes to
    # main go through required PRs (branch ruleset) and GitHub's own push
    # protection, so scanning here covers the meaningful path without the
    # base==head edge cases TruffleHog hits on some push events.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # need both base and head commits to diff the range
      # TruffleHog *validates* findings — it calls the provider API to confirm a
      # secret is live — so --only-verified fails the build solely on a
      # confirmed-active credential, layering validation over GitHub's native
      # detection + push protection.
      - name: Scan for verified secrets
        uses: trufflesecurity/trufflehog@6f3c981e7b77f235fd2702dd74af25fc4b72bf11 # v3.96.0
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  # Required check: runs the shared e2e composite action against the pinned
  # Vikunja version (docker-compose's default), so it stays reproducible. The
  # job name is load-bearing — the branch ruleset requires this exact status
  # check ("End-to-end (live Vikunja)"), so don't rename it without updating the
  # ruleset. Drift against :latest is tracked out-of-band by upstream-drift.yml,
  # which files an issue rather than gating PRs on a floating upstream tag.
  e2e:
    name: End-to-end (live Vikunja)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/e2e
        with:
          vikunja-version: "2.3.0"
