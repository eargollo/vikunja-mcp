version: 2
updates:
  # npm dependencies (the single direct dep + its transitive tree via the
  # committed lockfile). Security updates are opened regardless of schedule.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine version bumps into one PR to cut review noise; security
      # fixes still come as their own PRs.
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # Keep the pinned GitHub Actions commit SHAs current — this is what makes
  # SHA-pinning maintainable instead of a one-time snapshot that rots.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
